apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: retail-app
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: retail-store
    Project: karatu-2025-capstone
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
